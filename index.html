<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>Truk Dealil - הרשמה</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0a192f; color: #fff; display: flex; justify-content: center; padding: 40px; }
        form { background: #112240; padding: 30px; border-radius: 12px; width: 100%; max-width: 400px; border: 1px solid #ff7f00; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        h2 { color: #ff7f00; text-align: center; margin-bottom: 25px; }
        input, textarea { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #233554; border-radius: 6px; background: #0a192f; color: #fff; box-sizing: border-box; }
        button { background: #ff7f00; color: #fff; padding: 14px; width: 100%; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; font-size: 16px; margin-top: 10px; transition: 0.3s; }
        button:hover { background: #e67300; }
    </style>
</head>
<body>
    <form id="regForm">
        <h2>Truk Dealil - רישום</h2>
        <input type="text" id="name" placeholder="שם מלא" required>
        <input type="tel" id="phone" placeholder="טלפון" required>
        <input type="email" id="email" placeholder="אימייל" required>
        <input type="text" id="company" placeholder="שם חברה">
        <textarea id="comments" placeholder="הערות" rows="3"></textarea>
        <button type="submit">שלח הרשמה</button>
    </form>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxHI6r6_hf7seSYLrMQjmXLSooqitw1V1-iX-ePpXn9PfXHBv26USs5dnMaGuSpLMcCEQ/exec';
        
        document.getElementById('regForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button');
            btn.innerText = 'שולח...';
            
            const data = {
                name: document.getElementById('name').value,
                phone: document.getElementById('phone').value,
                email: document.getElementById('email').value,
                company: document.getElementById('company').value,
                comments: document.getElementById('comments').value
            };
            
            try {
                await fetch(SCRIPT_URL, {
                    method: 'POST',
                    mode: 'no-cors', // נדרש למניעת בעיות CORS
                    cache: 'no-cache',
                    body: JSON.stringify(data)
                });
                alert('נרשמת בהצלחה למערכת Truk Dealil!');
                document.getElementById('regForm').reset();
            } catch (err) {
                alert('שגיאה בשליחה, נסה שוב.');
            } finally {
                btn.innerText = 'שלח הרשמה';
            }
        });
    </script>
</body>
</html>
